<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Staff Dashboard</title>
  <style>
    body{font-family:Arial;margin:20px}
    .stats{display:flex;gap:16px;margin-bottom:20px}
    .card{padding:12px;border:1px solid #ddd;border-radius:6px;width:220px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border:1px solid #eee;text-align:left}
    .actions button{margin-right:8px}
  </style>
</head>
<body>
  <h1>Staff Dashboard</h1>

  <div class="stats">
    <div class="card">
      <strong>Total Revenue:</strong>
      <div id="totalRevenue">-</div>
    </div>
    <div class="card">
      <strong>Slots</strong>
      <div>Total: <span id="slotsTotal">-</span></div>
      <div>Occupied: <span id="slotsOccupied">-</span></div>
      <div>Available: <span id="slotsAvailable">-</span></div>
    </div>
    <div class="card">
      <strong>Payments (Today)</strong>
      <div>Amount: <span id="paymentsTodayAmount">-</span></div>
      <div>Transactions: <span id="paymentsTodayCount">-</span></div>
      <div>Paid: <span id="paymentsPaid">-</span> / Unpaid: <span id="paymentsUnpaid">-</span></div>
    </div>
  </div>

  <h2>Current Tickets</h2>
  <table>
    <thead><tr><th>Plate</th><th>Entry Time</th><th>Area</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="ticketsBody"><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>

  <script>
    async function loadDashboard(){
      try{
        const res = await fetch('/api/v1/staff/dashboard');
        const data = await res.json();

        document.getElementById('totalRevenue').textContent = new Intl.NumberFormat().format(data.totalRevenue);
        document.getElementById('slotsTotal').textContent = data.slots.total;
        document.getElementById('slotsOccupied').textContent = data.slots.occupied;
        document.getElementById('slotsAvailable').textContent = data.slots.available;

        document.getElementById('paymentsTodayAmount').textContent = new Intl.NumberFormat().format(data.paymentsToday.totalAmount || 0);
        document.getElementById('paymentsTodayCount').textContent = data.paymentsToday.transactions;
        document.getElementById('paymentsPaid').textContent = data.paymentsToday.paid;
        document.getElementById('paymentsUnpaid').textContent = data.paymentsToday.unpaid;

        const tbody = document.getElementById('ticketsBody');
        tbody.innerHTML = '';
        if (data.currentTickets && data.currentTickets.length){
          data.currentTickets.forEach(t => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${t.license_plate}</td><td>${t.entry_time}</td><td>${t.area || '-'}</td><td>${t.status}</td><td class="actions"><button onclick="markPaid(${t.ticket_id})">Mark Paid</button></td>`;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="5">No active tickets</td></tr>';
        }

      } catch (e){
        console.error(e);
      }
    }

    async function markPaid(ticketId){
      // placeholder: endpoint to record payment would be implemented separately
      alert('Mark paid not implemented: ticket ' + ticketId);
    }

    loadDashboard();
    // refresh every 20s
    setInterval(loadDashboard, 20000);
  </script>
</body>
</html>
