<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forgot Password</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Inter", sans-serif;
                min-height: 100vh;
                background: linear-gradient(135deg,
                        #eef0fb 0%,
                        #e8eaf6 40%,
                        #e0f2f1 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1.5rem;
            }

            .card {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
                padding: 2.5rem 2rem;
                width: 100%;
                max-width: 400px;
                transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
            }

            .card-header {
                text-align: center;
                margin-bottom: 2rem;
            }

            .card-header h1 {
                font-size: 1.6rem;
                font-weight: 700;
                color: #1a2340;
                margin-bottom: 0.5rem;
            }

            .card-header p {
                font-size: 0.875rem;
                color: #6b7280;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .form-label {
                display: block;
                font-size: 0.85rem;
                font-weight: 600;
                color: #374151;
                margin-bottom: 0.5rem;
            }

            /* Custom Select & Input Wrapper giống login.html */
            .input-group {
                position: relative;
            }

            .form-control {
                width: 100%;
                padding: 0.75rem 1rem;
                font-family: inherit;
                font-size: 0.925rem;
                color: #1f2937;
                background-color: #f9fafb;
                border: 1px solid #e5e7eb;
                border-radius: 8px;
                outline: none;
                transition: all 0.2s ease;
            }

            select.form-control {
                appearance: none;
                background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right 1rem center;
                background-size: 1em;
                padding-right: 2.5rem;
            }

            .form-control:focus {
                background-color: #fff;
                border-color: #6366f1;
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            }

            /* Alert Box đồng bộ hệ thống */
            .alert-box {
                border-radius: 8px;
                padding: 0.75rem 1rem;
                margin-bottom: 1.25rem;
                font-size: 0.85rem;
                display: none;
                align-items: flex-start;
                gap: 0.5rem;
                line-height: 1.4;
            }

            .alert-box.error {
                display: flex;
                background-color: #fef2f2;
                border: 1px solid #fee2e2;
                color: #ef4444;
            }

            .alert-box.success {
                display: flex;
                background-color: #ecfdf5;
                border: 1px solid #d1fae5;
                color: #10b981;
            }

            .btn-submit {
                width: 100%;
                padding: 0.75rem 1rem;
                background: #1b6e6e;
                /* Tone màu Teal chủ đạo giống nút trên home.html */
                color: #fff;
                border: none;
                border-radius: 8px;
                font-family: inherit;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.2s;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 0.5rem;
                box-shadow: 0 2px 4px rgba(27, 110, 110, 0.15);
            }

            .btn-submit:hover {
                background: #155858;
            }

            .btn-submit:disabled {
                background: #9ca3af;
                cursor: not-allowed;
                box-shadow: none;
            }

            .card-footer {
                margin-top: 1.5rem;
                text-align: center;
            }

            .card-footer a {
                color: #6366f1;
                font-size: 0.875rem;
                font-weight: 500;
                text-decoration: none;
                transition: color 0.2s;
            }

            .card-footer a:hover {
                color: #4f46e5;
                text-decoration: underline;
            }

            /* Hiệu ứng loading spinner */
            .spinner {
                width: 18px;
                height: 18px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-radius: 50%;
                border-top-color: #fff;
                animation: spin 0.8s linear infinite;
                display: none;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <div class="card">
            <div class="card-header">
                <h1>Forgot Password?</h1>
                <p>Choose recovery method to receive OTP code</p>
            </div>

            <div id="alertBox" class="alert-box">
                <span id="alertText"></span>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="method">Receive Code Via</label>
                    <div class="input-group">
                        <select id="method" class="form-control" name="method" onchange="handleMethodChange()">
                            <option value="email">Email Address</option>
                            <option value="phone">Phone Number</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label id="inputLabel" class="form-label" for="contactInfo">Email Address</label>
                    <div class="input-group">
                        <input type="email" id="contactInfo" class="form-control" name="contactInfo" required
                               placeholder="example@domain.com" />
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit">
                    <span class="spinner" id="btnSpinner"></span>
                    <span id="btnText">Send Recovery Code</span>
                </button>
            </form>

            <div class="card-footer">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>

        <script>
            // Hàm thay đổi trạng thái Input động linh hoạt theo lựa chọn
            function handleMethodChange() {
                const method = document.getElementById("method").value;
                const label = document.getElementById("inputLabel");
                const input = document.getElementById("contactInfo");
                const alertBox = document.getElementById("alertBox");

                // Ẩn alert khi chuyển chế độ chọn
                alertBox.style.display = "none";

                if (method === "email") {
                    label.textContent = "Email Address";
                    input.placeholder = "example@domain.com";
                    input.type = "email";
                } else {
                    label.textContent = "Phone Number";
                    input.placeholder = "0987654321";
                    input.type = "text";
                }
                input.value = "";
                input.focus();
            }

            // Xử lý gửi Form bằng Fetch API đồng bộ với dự án gốc
            document.getElementById("forgotPasswordForm").addEventListener("submit", async function (e) {
                e.preventDefault();
                const method = document.getElementById("method").value;
                const contactInfo = document.getElementById("contactInfo").value.trim();
                const alertBox = document.getElementById("alertBox");
                const alertText = document.getElementById("alertText");
                const btnSubmit = document.getElementById("btnSubmit");
                const btnSpinner = document.getElementById("btnSpinner");
                const btnText = document.getElementById("btnText");
                alertBox.style.display = "none";
                btnSubmit.disabled = true;
                btnSpinner.style.display = "inline-block";
                btnText.textContent = "Sending...";
                
                // Định dạng Form URL-encoded giống hệt cấu trúc xử lý dữ liệu của DriverAPI/LoginAPI
                const params = new URLSearchParams();
                params.append("method", method);
                params.append("contactInfo", contactInfo);
                try {
                    const response = await fetch(
                            "http://localhost:8080/api/v1/auth/forgot-password", {
                                method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded",
                        },
                        body: params.toString(),
                    },
                    );
                    const data = await response.json();
                    alertBox.style.display = "flex";
                    if (response.status === 200) {
                        alertBox.className = "alert-box success";
                        alertText.textContent =
                                data.message || "✓ OTP verification code sent successfully!";
                        document.getElementById("contactInfo").value = "";
                    } else {
                        alertBox.className = "alert-box error";
                        alertText.textContent = data.message || "✗ Account details not found.";
                    }
                } catch (err) {
                    alertBox.style.display = "flex";
                    alertBox.className = "alert-box error";
                    alertText.textContent = "✗ Cannot reach the server. Check your connection.";
                } finally {
                    // Trả lại trạng thái ban đầu của nút bấm
                    btnSubmit.disabled = false;
                    btnSpinner.style.display = "none";
                    btnText.textContent = "Send Recovery Code";
                }
            });
        </script>
    </body>
</html>
